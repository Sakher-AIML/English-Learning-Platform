<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise — EnglishPath</title>
    <meta name="description" content="Master English with structured levels, quizzes, and smart progress tracking.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer"></div>
    <header class="topbar">
        <a class="brand" href="index.html">
            <span class="brand-icon">📘</span> EnglishPath
        </a>
        <nav>
            <span id="nav-logged-out">
                <a href="login.html">Login</a>
                <a href="register.html" class="btn btn-primary" style="padding:7px 16px;font-size:0.88rem">Get Started</a>
            </span>
            <span id="nav-logged-in" style="display:none">
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="analytics.html">📈 Analytics</a>
                <a href="#" id="logoutBtn">Logout</a>
            </span>
            <button id="themeToggle" class="btn btn-icon btn-ghost" type="button" aria-label="Toggle theme" title="Switch theme">🌓</button>
        </nav>
    </header>

    <main class="container">
        <div class="flash-wrap"></div>
        <div id="exercise-content">
            <p class="small text-center" style="margin-top:2rem">Loading exercise…</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <span id="footer-logged-out">
                    <a href="login.html">Login</a>
                    <a href="register.html">Register</a>
                </span>
                <span id="footer-logged-in" style="display:none">
                    <a href="dashboard.html">Dashboard</a>
                    <a href="analytics.html">Analytics</a>
                </span>
            </div>
            <p>© 2026 EnglishPath — Built for learners, by learners.</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="script.js"></script>
    <script>
        APP.updateNav();
        if (!APP.requireLogin()) throw new Error("redirect");

        (function () {
            var params = APP.getParams();
            var level = params.level;
            var lessonIndex = parseInt(params.index, 10);
            var username = APP.getCurrentUser();
            var LEVEL_ORDER = APP.LEVEL_ORDER;

            if (!level || LEVEL_ORDER.indexOf(level) === -1 || isNaN(lessonIndex)) {
                window.location.href = "dashboard.html";
                return;
            }

            var levelTitle = level.charAt(0).toUpperCase() + level.slice(1);

            APP.loadLevelData(level).then(function (levelData) {
                if (lessonIndex < 0 || lessonIndex >= levelData.length) {
                    window.location.href = "lesson.html?level=" + level;
                    return;
                }

                var progress = APP.getProgress(username);

                // Check lesson access
                Promise.all(LEVEL_ORDER.map(function (l) { return APP.loadLevelData(l); }))
                    .then(function (datasets) {
                        var levelDataMap = {};
                        LEVEL_ORDER.forEach(function (l, i) { levelDataMap[l] = datasets[i]; });
                        var completionMap = {};
                        LEVEL_ORDER.forEach(function (l) {
                            completionMap[l] = APP.levelCompletionPercent(l, levelDataMap[l], progress);
                        });

                        if (!APP.isLevelUnlocked(level, completionMap) || !APP.canOpenLesson(level, lessonIndex, progress)) {
                            APP.showFlash("Finish the previous lesson first.", "error");
                            setTimeout(function () { window.location.href = "lesson.html?level=" + level; }, 1500);
                            return;
                        }

                        var lessonData = levelData[lessonIndex];
                        var questions = lessonData.questions || [];
                        var lessonTitle = lessonData.title || ("Lesson " + (lessonIndex + 1));

                        document.title = lessonTitle + " — EnglishPath";
                        renderQuiz(level, levelTitle, lessonIndex, lessonTitle, questions);
                    });
            });

            function renderQuiz(level, levelTitle, lessonIndex, lessonTitle, questions) {
                var content = document.getElementById("exercise-content");
                var qHtml = questions.map(function (q, qi) {
                    var opts = q.options.map(function (opt) {
                        return '<label class="option-line">'
                            + '<input type="radio" name="q_' + qi + '" value="' + opt.replace(/"/g, "&quot;") + '" required>'
                            + ' ' + opt + '</label>';
                    }).join("");
                    return '<div class="question-block">'
                        + '<p><strong>Q' + (qi + 1) + '.</strong> ' + q.question + '</p>'
                        + opts
                        + '</div>';
                }).join("");

                content.innerHTML =
                    '<section class="card">'
                    + '<p class="eyebrow">' + levelTitle + ' › Lesson ' + (lessonIndex + 1) + '</p>'
                    + '<h2>' + lessonTitle + '</h2>'
                    + '<p class="text-muted">Answer all ' + questions.length + ' questions below, then submit to see your results.</p>'
                    + '</section>'
                    + '<section class="card">'
                    + '<form method="POST" id="quizForm">'
                    + '<div class="quiz-meta">'
                    + '<div class="progress-line"><span class="progress-fill" id="quizProgressFill" data-progress="0"></span></div>'
                    + '<p id="quizProgressText" class="small">0 of ' + questions.length + ' answered</p>'
                    + '</div>'
                    + qHtml
                    + '<button class="btn btn-primary" type="submit" style="margin-top:8px;width:100%">📨 Submit Answers</button>'
                    + '</form>'
                    + '</section>';

                // Override form submission to handle client-side
                var form = document.getElementById("quizForm");
                form.addEventListener("submit", function (e) {
                    e.preventDefault();

                    // Validate all answered
                    var groups = new Set();
                    var checked = new Set();
                    form.querySelectorAll("input[type='radio']").forEach(function (inp) {
                        groups.add(inp.name);
                        if (inp.checked) checked.add(inp.name);
                    });
                    if (groups.size !== checked.size) {
                        var rem = groups.size - checked.size;
                        alert("Please answer all questions before submitting. " + rem + " question" + (rem > 1 ? "s" : "") + " remaining.");
                        return;
                    }

                    // Score
                    var score = 0;
                    var answeredQuestions = questions.map(function (q, qi) {
                        var picked = (form.querySelector("input[name='q_" + qi + "']:checked") || {}).value || "";
                        var correct = q.answer;
                        var isCorrect = picked === correct;
                        if (isCorrect) score++;
                        return { question: q.question, options: q.options, picked: picked, answer: correct, is_correct: isCorrect };
                    });

                    var total = questions.length;
                    var percent = total ? Math.round((score / total) * 100) : 0;
                    var passed = percent >= APP.PASS_PERCENT;

                    APP.saveProgressItem(username, level, lessonIndex, score, total);
                    APP.recordAttempt(username, level, lessonIndex, score, total, percent, passed);

                    if (passed) {
                        APP.showFlash("Great job! You scored " + percent + "% and passed.", "success");
                    } else {
                        APP.showFlash("You scored " + percent + "%. Keep practicing and try again.", "error");
                    }

                    renderResult(level, levelTitle, lessonIndex, lessonTitle, questions, answeredQuestions, score, total, percent, passed);
                });

                // Re-init quiz progress tracking from script.js
                // (script.js sets up quizForm listeners on DOMContentLoaded, so we trigger manually)
                initQuizProgress(form, questions.length);
            }

            function initQuizProgress(form, total) {
                var fill = document.getElementById("quizProgressFill");
                var text = document.getElementById("quizProgressText");
                function update() {
                    var groups = new Set();
                    var checked = new Set();
                    form.querySelectorAll("input[type='radio']").forEach(function (inp) {
                        groups.add(inp.name);
                        if (inp.checked) checked.add(inp.name);
                    });
                    var pct = groups.size ? Math.round((checked.size / groups.size) * 100) : 0;
                    if (fill) { fill.style.width = pct + "%"; fill.dataset.progress = pct; }
                    if (text) text.textContent = checked.size + " of " + total + " answered";
                }
                form.querySelectorAll("input[type='radio']").forEach(function (inp) {
                    inp.addEventListener("change", function () {
                        var siblings = form.querySelectorAll("input[name='" + inp.name + "']");
                        siblings.forEach(function (s) {
                            var lbl = s.closest(".option-line");
                            if (lbl) { lbl.style.borderColor = "transparent"; lbl.style.background = ""; }
                        });
                        var lbl = inp.closest(".option-line");
                        if (lbl) { lbl.style.borderColor = "rgba(85,163,255,0.4)"; lbl.style.background = "rgba(85,163,255,0.06)"; }
                        update();
                    });
                });
                update();
            }

            function renderResult(level, levelTitle, lessonIndex, lessonTitle, questions, answered, score, total, percent, passed) {
                var content = document.getElementById("exercise-content");
                var bannerClass = passed ? "result-pass" : "result-fail";
                var bannerEmoji = passed ? "🎉" : "💪";
                var bannerMsg = passed ? "Excellent work! You passed this lesson." : "Don't give up! Review your mistakes below and try again.";

                var reviewHtml = answered.map(function (item, qi) {
                    var opts = item.options.map(function (opt) {
                        var cls = "";
                        var badge = "";
                        if (opt === item.answer) cls += " correct-option";
                        if (opt === item.picked && !item.is_correct) { cls += " wrong-option"; badge = '<span class="badge badge-danger" style="margin-left:auto;font-size:0.7rem">Your answer</span>'; }
                        else if (opt === item.picked && item.is_correct) badge = '<span class="badge" style="margin-left:auto;font-size:0.7rem">✓ Correct</span>';
                        else if (opt === item.answer && opt !== item.picked) badge = '<span class="badge badge-primary" style="margin-left:auto;font-size:0.7rem">Correct answer</span>';
                        return '<label class="option-line' + cls + '">' + opt + badge + '</label>';
                    }).join("");
                    return '<div class="question-block"><p><strong>Q' + (qi + 1) + '.</strong> ' + item.question + '</p>' + opts + '</div>';
                }).join("");

                content.innerHTML =
                    '<section class="card">'
                    + '<p class="eyebrow">' + levelTitle + ' › Lesson ' + (lessonIndex + 1) + '</p>'
                    + '<h2>' + lessonTitle + '</h2>'
                    + '<div class="result-banner ' + bannerClass + '">'
                    + '<h3>' + bannerEmoji + ' ' + percent + '% • ' + score + '/' + total + ' correct</h3>'
                    + '<p>' + bannerMsg + '</p>'
                    + '</div>'
                    + '</section>'
                    + '<section class="card">'
                    + '<div class="section-head"><h3>📝 Answer Review</h3></div>'
                    + reviewHtml
                    + '<div class="hero-actions" style="margin-top:24px">'
                    + '<a class="btn" href="exercise.html?level=' + level + '&index=' + lessonIndex + '">Try Again</a>'
                    + '<a class="btn btn-primary" href="lesson.html?level=' + level + '">← Back to Lessons</a>'
                    + '</div>'
                    + '</section>';
            }
        }());
    </script>
</body>
</html>
