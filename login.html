{% extends "base.html" %}

{% block title %}Login — EnglishPath{% endblock %}

{% block content %}
<section class="card form-card">
    <p class="eyebrow">Welcome Back</p>
    <h2>Login to Your Account</h2>
    <form method="POST">
        <label for="username">👤 Username</label>
        <input id="username" type="text" name="username" placeholder="Enter your username" required>

        <label for="password">🔒 Password</label>
        <input id="password" type="password" name="password" placeholder="Enter your password" required>

        <button class="btn btn-primary" type="submit" style="margin-top:8px">Login</button>
    </form>
    <div class="divider">or</div>
    <p class="small text-center" style="margin-top:0">New here? <a href="{{ url_for('register') }}">Create a free account</a></p>
</section>
{% endblock %}
