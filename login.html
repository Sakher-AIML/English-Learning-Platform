<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EnglishPath</title>
    <meta name="description" content="Master English with structured levels, quizzes, and smart progress tracking.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer"></div>
    <header class="topbar">
        <a class="brand" href="index.html">
            <span class="brand-icon">📘</span> EnglishPath
        </a>
        <nav>
            <span id="nav-logged-out">
                <a href="login.html">Login</a>
                <a href="register.html" class="btn btn-primary" style="padding:7px 16px;font-size:0.88rem">Get Started</a>
            </span>
            <span id="nav-logged-in" style="display:none">
                <a href="dashboard.html">📊 Dashboard</a>
                <a href="analytics.html">📈 Analytics</a>
                <a href="#" id="logoutBtn">Logout</a>
            </span>
            <button id="themeToggle" class="btn btn-icon btn-ghost" type="button" aria-label="Toggle theme" title="Switch theme">🌓</button>
        </nav>
    </header>

    <main class="container">
        <div class="flash-wrap"></div>

        <section class="card form-card">
            <p class="eyebrow">Welcome Back</p>
            <h2>Login to Your Account</h2>
            <form id="loginForm">
                <label for="username">👤 Username</label>
                <input id="username" type="text" name="username" placeholder="Enter your username" required>

                <label for="password">🔒 Password</label>
                <input id="password" type="password" name="password" placeholder="Enter your password" required>

                <button class="btn btn-primary" type="submit" style="margin-top:8px">Login</button>
            </form>
            <div class="divider">or</div>
            <p class="small text-center" style="margin-top:0">New here? <a href="register.html">Create a free account</a></p>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-links">
                <a href="index.html">Home</a>
                <span id="footer-logged-out">
                    <a href="login.html">Login</a>
                    <a href="register.html">Register</a>
                </span>
                <span id="footer-logged-in" style="display:none">
                    <a href="dashboard.html">Dashboard</a>
                    <a href="analytics.html">Analytics</a>
                </span>
            </div>
            <p>© 2026 EnglishPath — Built for learners, by learners.</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script src="script.js"></script>
    <script>
        APP.updateNav();
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            var username = document.getElementById("username").value.trim();
            var password = document.getElementById("password").value;
            var result = APP.login(username, password);
            if (result.ok) {
                window.location.href = "dashboard.html";
            } else {
                APP.showFlash(result.error, "error");
            }
        });
    </script>
</body>
</html>
